<!DOCTYPE html>
<html>
<head>
    <title>Login - Howardhome</title>
    <style>
        body { background:#f5f5f5; font-family:Arial; }
        .login-box {
            background:white; padding:20px; border-radius:10px;
            max-width:350px; margin:auto; margin-top:60px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }
        input {
            width:100%; padding:10px; margin-top:10px;
            border-radius:8px; border:1px solid #ccc;
        }
        button {
            margin-top:15px; padding:10px; width:100%;
            background:#007bff; color:white; border:none;
            border-radius:8px;
        }
    </style>
</head>

<body>

<nav style="background:white; padding:10px; border-radius:8px; margin-bottom:20px;">
    <ul style="display:flex; gap:20px; list-style:none;">
        <li><a href="index.html">Home</a></li>
        <li><a href="properties.html">Properties</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<div class="login-box">
    <h2 style="text-align:center;">Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
</div>

</body>
</html>
